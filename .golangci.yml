version: "2"

linters:
    default: standard
    exclusions:
        presets:
            - comments
            - std-error-handling
            - common-false-positives
        rules:
            - path: _test\.go
              linters:
                  - errcheck
                  - gocritic
                  - dupl
                  - goconst
                  - gocyclo
            - path: test/
              linters:
                  - errcheck
                  - gocritic
                  - dupl
                  - goconst
                  - gocyclo
        paths:
            - vendor
            - bin
            - third_party
            - ".*\\.pb\\.go$"

run:
    timeout: 5m
    tests: true
