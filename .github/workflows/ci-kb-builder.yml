name: CI - KB Builder

on:
    push:
        branches: [ main, develop ]
    pull_request:
        branches: [ main, develop ]

jobs:
    kb-builder:
        name: KB Builder
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

            - name: Set up Go
              uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
              with:
                  go-version: '1.26.1'
                  cache: false

            - name: Cache Go modules
              uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
              with:
                  path: |
                      ~/go/pkg/mod
                      ~/.cache/go-build
                  key: ${{ runner.os }}-go-1.26.1-${{ hashFiles('**/go.sum') }}
                  restore-keys: |
                      ${{ runner.os }}-go-1.26.1-

            - name: Verify dependencies
              run: go mod verify

            - name: Download dependencies
              run: go mod download

            - name: Lint code
              uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20 # v9
              with:
                  version: v2.12.2
                  args: --timeout=5m ./cmd/... ./internal/...

            - name: Run go vet
              run: go vet ./cmd/... ./internal/...

            - name: Check formatting
              run: |
                  gofmt -l ./cmd ./internal > /tmp/gofmt.out
                  if [ -s /tmp/gofmt.out ]; then
                    echo "The following files are not formatted:"
                    cat /tmp/gofmt.out
                    exit 1
                  fi

            - name: Build kb-builder
              run: |
                  mkdir -p bin
                  go build -v -o bin/pgedge-ai-kb-builder ./cmd/kb-builder

            - name: Verify binary
              run: |
                  ls -lh bin/pgedge-ai-kb-builder
                  file bin/pgedge-ai-kb-builder
                  ./bin/pgedge-ai-kb-builder --help

            - name: Run unit tests
              run: go test -v -race -coverprofile=coverage.out -covermode=atomic ./cmd/... ./internal/...

            - name: Generate coverage report
              run: |
                  go tool cover -html=coverage.out -o coverage.html
                  go tool cover -func=coverage.out

            - name: Upload build artifact
              uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
              with:
                  name: pgedge-ai-kb-builder-linux-amd64
                  path: bin/pgedge-ai-kb-builder
                  retention-days: 7

            - name: Upload coverage artifact
              uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
              with:
                  name: coverage
                  path: |
                      coverage.html
                      coverage.out
                  retention-days: 7
