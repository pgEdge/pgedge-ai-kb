name: Release

on:
    push:
        tags:
            - 'v*'
    workflow_dispatch:

permissions:
    contents: write
    packages: write

jobs:
    # Build for x86_64 architecture
    build-amd64:
        name: Build x86_64
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
              with:
                  fetch-depth: 0

            - name: Fetch all tags
              run: git fetch --force --tags

            - name: Set up Go
              uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
              with:
                  go-version: '1.26.1'
                  cache: true

            - name: Run Go unit tests
              run: go test -v ./cmd/... ./internal/...

            - name: Run GoReleaser (amd64 only)
              uses: goreleaser/goreleaser-action@1a80836c5c9d9e5755a25cb59ec6f45a3b5f41a8 # v7
              with:
                  distribution: goreleaser
                  version: latest
                  args: release --clean --config .goreleaser-amd64.yaml ${{ github.event_name == 'workflow_dispatch' && github.ref_type != 'tag' && '--snapshot' || '' }}
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

            - name: Upload amd64 artifacts
              uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
              with:
                  name: release-artifacts-amd64
                  path: |
                      dist/*.tar.gz
                      dist/*.zip
                  retention-days: 1

    # Build for ARM64 architecture
    build-arm64:
        name: Build ARM64
        runs-on: ubuntu-24.04-arm
        steps:
            - name: Checkout code
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
              with:
                  fetch-depth: 0

            - name: Fetch all tags
              run: git fetch --force --tags

            - name: Set up Go
              uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
              with:
                  go-version: '1.26.1'
                  cache: true

            - name: Run Go unit tests
              run: go test -v ./cmd/... ./internal/...

            - name: Run GoReleaser (arm64 only)
              uses: goreleaser/goreleaser-action@1a80836c5c9d9e5755a25cb59ec6f45a3b5f41a8 # v7
              with:
                  distribution: goreleaser
                  version: latest
                  args: release --clean --config .goreleaser-arm64.yaml ${{ github.event_name == 'workflow_dispatch' && github.ref_type != 'tag' && '--snapshot' || '' }}
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

            - name: Upload arm64 artifacts
              uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
              with:
                  name: release-artifacts-arm64
                  path: |
                      dist/*.tar.gz
                      dist/*.zip
                  retention-days: 1

    # Combine artifacts and create release
    release:
        name: Create Release
        runs-on: ubuntu-latest
        needs: [build-amd64, build-arm64]
        if: github.ref_type == 'tag'
        steps:
            - name: Checkout code
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
              with:
                  fetch-depth: 0

            - name: Download amd64 artifacts
              uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
              with:
                  name: release-artifacts-amd64
                  path: dist/

            - name: Download arm64 artifacts
              uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
              with:
                  name: release-artifacts-arm64
                  path: dist/

            - name: List all artifacts
              run: ls -lh dist/

            - name: Generate checksums
              run: |
                  cd dist
                  sha256sum *.tar.gz *.zip > checksums.txt
                  cat checksums.txt

            - name: Create GitHub Release
              uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3
              with:
                  files: |
                      dist/*.tar.gz
                      dist/*.zip
                      dist/checksums.txt
                  generate_release_notes: true
                  draft: false
                  prerelease: false
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

            - name: Upload final artifacts
              uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
              with:
                  name: release-artifacts-all
                  path: |
                      dist/*.tar.gz
                      dist/*.zip
                      dist/checksums.txt
                  retention-days: 90
