name: Release Knowledge Base

on:
    workflow_dispatch:
        inputs:
            branch:
                description: 'Branch to build from'
                required: true
                default: 'main'
            release_tag:
                description: 'Release tag (e.g. kb-2026-04-22)'
                required: true

permissions:
    contents: write
    # Needed for the auto-bump PR opened by bump-kb-db-pin.
    pull-requests: write

jobs:
    build-and-release-kb:
        name: Build and Release kb.db
        runs-on: [ollama, self-hosted]
        steps:
            - name: Checkout code
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
              with:
                  ref: ${{ github.event.inputs.branch }}
                  fetch-depth: 0

            - name: Clean build artifacts from previous runs
              run: rm -rf bin/ pgedge-ai-kb-builder examples/pgedge-ai-kb-builder-build.yaml

            - name: Validate allowed build ref
              env:
                  BUILD_REF: ${{ github.event.inputs.branch }}
              run: |
                  if [[ ! "$BUILD_REF" =~ ^(main|release/[A-Za-z0-9._-]+)$ ]]; then
                    echo "Ref '$BUILD_REF' is not allowed for secret-backed release workflow"
                    exit 1
                  fi

            - name: Set up Go
              uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
              with:
                  go-version: '1.25'
                  cache: true

            - name: Configure git for private repo access
              env:
                  PGEDGE_BUILDER_TOKEN: ${{ secrets.PGEDGE_BUILDER_TOKEN }}
              run: |
                  [ -n "$PGEDGE_BUILDER_TOKEN" ] || { echo "PGEDGE_BUILDER_TOKEN secret is missing"; exit 1; }
                  echo "GIT_CONFIG_GLOBAL=$RUNNER_TEMP/gitconfig" >> "$GITHUB_ENV"
                  printf '' > "$RUNNER_TEMP/gitconfig"
                  GIT_CONFIG_GLOBAL="$RUNNER_TEMP/gitconfig" git config --global credential.helper ""
                  GIT_CONFIG_GLOBAL="$RUNNER_TEMP/gitconfig" git config --global url."https://x-access-token:${PGEDGE_BUILDER_TOKEN}@github.com/".insteadOf "https://github.com/"

            - name: Start Ollama service
              run: |
                  ollama serve &
                  echo $! > "$RUNNER_TEMP/ollama.pid"
                  timeout=60; elapsed=0
                  until curl -s http://localhost:11434/api/tags > /dev/null; do
                    sleep 2; elapsed=$((elapsed + 2))
                    if [ "$elapsed" -ge "$timeout" ]; then echo "Ollama did not start within ${timeout}s"; exit 1; fi
                  done
                  ollama pull nomic-embed-text
                  echo "Ollama ready with nomic-embed-text"

            - name: Build kb-builder binary
              run: CGO_ENABLED=0 go build -o pgedge-ai-kb-builder ./cmd/kb-builder

            - name: Setup API keys for kb-builder
              env:
                  OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
                  VOYAGE_API_KEY: ${{ secrets.VOYAGE_API_KEY }}
                  API_KEYS_DIR: ${{ runner.temp }}/api-keys
              run: |
                  [ -n "$OPENAI_API_KEY" ] || { echo "OPENAI_API_KEY secret is missing"; exit 1; }
                  [ -n "$VOYAGE_API_KEY" ] || { echo "VOYAGE_API_KEY secret is missing"; exit 1; }
                  mkdir -p "$API_KEYS_DIR"
                  printf '%s' "$OPENAI_API_KEY" > "$API_KEYS_DIR/openai-key"
                  printf '%s' "$VOYAGE_API_KEY" > "$API_KEYS_DIR/voyage-key"
                  chmod 600 "$API_KEYS_DIR"/*

            - name: Configure kb-builder for cloud providers
              env:
                  API_KEYS_DIR: ${{ runner.temp }}/api-keys
              run: |
                  cp examples/pgedge-ai-kb-builder.yaml examples/pgedge-ai-kb-builder-build.yaml
                  sed -i '' 's|database_path: "bin/pgedge-ai-kb.db"|database_path: "bin/kb.db"|' examples/pgedge-ai-kb-builder-build.yaml
                  sed -i '' "s|api_key_file: \"~/.openai-api-key\"|api_key_file: \"${API_KEYS_DIR}/openai-key\"|" examples/pgedge-ai-kb-builder-build.yaml
                  sed -i '' "s|api_key_file: \"~/.voyage-api-key\"|api_key_file: \"${API_KEYS_DIR}/voyage-key\"|" examples/pgedge-ai-kb-builder-build.yaml
                  sed -i '' 's|git@github.com:|https://github.com/|g' examples/pgedge-ai-kb-builder-build.yaml
                  grep -q 'database_path: "bin/kb.db"' examples/pgedge-ai-kb-builder-build.yaml || { echo "database_path replacement failed"; exit 1; }
                  grep -q "api_key_file: \"${API_KEYS_DIR}/openai-key\"" examples/pgedge-ai-kb-builder-build.yaml || { echo "OpenAI key path replacement failed"; exit 1; }
                  grep -q "api_key_file: \"${API_KEYS_DIR}/voyage-key\"" examples/pgedge-ai-kb-builder-build.yaml || { echo "Voyage key path replacement failed"; exit 1; }
                  grep -q 'https://github.com/' examples/pgedge-ai-kb-builder-build.yaml || { echo "SSH URL replacement failed"; exit 1; }

            - name: Generate kb.db
              run: |
                  mkdir -p bin
                  ./pgedge-ai-kb-builder --config examples/pgedge-ai-kb-builder-build.yaml --max-retries 50
              env:
                  OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
                  VOYAGE_API_KEY: ${{ secrets.VOYAGE_API_KEY }}

            - name: Verify kb.db was created
              run: |
                  if [ ! -f "bin/kb.db" ]; then
                    echo "Error: bin/kb.db was not created"
                    exit 1
                  fi
                  echo "kb.db size: $(du -sh bin/kb.db | cut -f1)"

            - name: Cleanup
              if: always()
              env:
                  API_KEYS_DIR: ${{ runner.temp }}/api-keys
              run: |
                  if [ -f "$RUNNER_TEMP/ollama.pid" ]; then
                    kill "$(cat "$RUNNER_TEMP/ollama.pid")" 2>/dev/null || true
                    rm -f "$RUNNER_TEMP/ollama.pid"
                  fi
                  rm -rf "$API_KEYS_DIR"
                  rm -f "$RUNNER_TEMP/gitconfig"

            - name: Create GitHub Release
              uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3
              with:
                  tag_name: ${{ github.event.inputs.release_tag }}
                  name: Knowledge Base ${{ github.event.inputs.release_tag }}
                  body: |
                      Knowledge base database built from branch `${{ github.event.inputs.branch }}`.

                      This release contains only `kb.db` for use by downstream consumers such as
                      the pgEdge Postgres MCP Server and the pgEdge AI DBA Workbench.
                  files: bin/kb.db
                  draft: false
                  prerelease: false
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    # =========================================================================
    # Auto-open a PR that bumps pkg/common.sh's KB_DB_RELEASE_TAG default to
    # the kb release tag just published. Without this, every kb release
    # requires a manual common.sh edit before package builds will pick it up.
    # =========================================================================
    bump-kb-db-pin:
        name: PR to bump KB_DB_RELEASE_TAG
        needs: build-and-release-kb
        runs-on: ubuntu-latest
        env:
            RELEASE_TAG: ${{ github.event.inputs.release_tag }}
            BASE_BRANCH: ${{ github.event.inputs.branch }}
            PR_BRANCH: auto/bump-kb-db-pin-${{ github.event.inputs.release_tag }}
            # Using PGEDGE_BUILDER_TOKEN (PAT) so the resulting PR triggers
            # downstream CI. GITHUB_TOKEN-authored PRs do not trigger CI by
            # GitHub policy, which would defeat the purpose of automation.
            GH_TOKEN: ${{ secrets.PGEDGE_BUILDER_TOKEN }}
        steps:
            - name: Checkout base branch
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
              with:
                  ref: ${{ env.BASE_BRANCH }}
                  fetch-depth: 0
                  token: ${{ secrets.PGEDGE_BUILDER_TOKEN }}

            - name: Update KB_DB_RELEASE_TAG default in pkg/common.sh
              id: bump
              run: |
                  set -euo pipefail
                  if [ ! -f pkg/common.sh ]; then
                      echo "::error::pkg/common.sh not found on ${BASE_BRANCH}"
                      exit 1
                  fi
                  before="$(grep 'KB_DB_RELEASE_TAG:-' pkg/common.sh || true)"
                  if [ -z "${before}" ]; then
                      echo "::error::No 'KB_DB_RELEASE_TAG:-' line in pkg/common.sh"
                      exit 1
                  fi
                  # Replace the default value between ':-' and the closing '}'
                  # so any previous tag format (kb-YYYY-MM-DD or otherwise) is
                  # accepted. Basic regex (escaped parens) is portable across
                  # GNU sed (runner) and BSD sed (local mac dev).
                  sed -i 's|\(KB_DB_RELEASE_TAG:-\)[^}]*\(}\)|\1'"${RELEASE_TAG}"'\2|' pkg/common.sh
                  after="$(grep 'KB_DB_RELEASE_TAG:-' pkg/common.sh)"
                  echo "Before: ${before}"
                  echo "After:  ${after}"
                  if [ "${before}" = "${after}" ]; then
                      echo "pkg/common.sh already references ${RELEASE_TAG}; skipping PR."
                      echo "skip=true" >> "$GITHUB_OUTPUT"
                  else
                      echo "skip=false" >> "$GITHUB_OUTPUT"
                  fi

            - name: Configure git author
              if: steps.bump.outputs.skip != 'true'
              run: |
                  git config user.name 'pgedge-builder[bot]'
                  git config user.email 'pgedge-builder[bot]@users.noreply.github.com'

            - name: Commit + push branch
              if: steps.bump.outputs.skip != 'true'
              run: |
                  set -euo pipefail
                  git checkout -B "${PR_BRANCH}"
                  git add pkg/common.sh
                  git commit -m "Bump KB_DB_RELEASE_TAG to ${RELEASE_TAG}"
                  git push --force-with-lease origin "${PR_BRANCH}"

            - name: Open or update PR
              if: steps.bump.outputs.skip != 'true'
              run: |
                  set -euo pipefail
                  body=$(cat <<EOF
                  Bumps the kb.db pin in \`pkg/common.sh\` to **\`${RELEASE_TAG}\`**,
                  the latest knowledgebase release produced by \`release-kb.yml\`.

                  Once merged, the next \`v*\` or \`v*-test*\` tag push will package
                  this kb.db.

                  Auto-generated by the \`release-kb.yml\` workflow.
                  EOF
                  )
                  # Assign + request review from individual maintainers.
                  # Switch to an org/team handle (e.g. --reviewer pgEdge/kb)
                  # once a team is established.
                  reviewers="maqeel75,dpage"
                  assignees="maqeel75,dpage"
                  if gh pr view "${PR_BRANCH}" --json number >/dev/null 2>&1; then
                      gh pr edit "${PR_BRANCH}" \
                          --title "Bump KB_DB_RELEASE_TAG to ${RELEASE_TAG}" \
                          --body "${body}" \
                          --add-reviewer "${reviewers}" \
                          --add-assignee "${assignees}"
                      echo "Updated existing PR for ${PR_BRANCH}"
                  else
                      gh pr create \
                          --base "${BASE_BRANCH}" \
                          --head "${PR_BRANCH}" \
                          --title "Bump KB_DB_RELEASE_TAG to ${RELEASE_TAG}" \
                          --body "${body}" \
                          --reviewer "${reviewers}" \
                          --assignee "${assignees}"
                      echo "Opened PR for ${PR_BRANCH}"
                  fi
